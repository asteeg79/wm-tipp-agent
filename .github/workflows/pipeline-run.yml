name: Pipeline Run (reusable)

# Wiederverwendbarer Pipeline-Lauf. Der Aufrufer gibt den Modus vor:
#  - news:    nur News + Struktur, KEINE KI (günstig, mehrmals täglich).
#  - predict: News + KI nur für Partien im 72h-Fenster (1×/Tag) bzw. fällige
#             T-3h-Partien (stündlich).
#  - full:    News + KI ohne Fenster (alle Partien; teuer, nur manuell).
on:
  workflow_call:
    inputs:
      mode:
        description: "news | predict | full"
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      ODDS_API_KEY:
        required: false

# Alle Pipeline-Läufe teilen sich eine Concurrency-Group → kein Überlappen,
# keine konkurrierenden /data-Commits.
jobs:
  run:
    runs-on: ubuntu-latest
    # Concurrency + Rechte auf Job-Ebene (robuster bei reusable workflows als
    # auf Top-Level).
    permissions:
      contents: write
    concurrency:
      group: data-pipeline
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      # pnpm-Version stammt aus package.json#packageManager (kein version:-Feld).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Inkrementeller Roh-Cache (Historie immutable, Feed-Cache 1 h) über Läufe.
      - name: Restore pipeline cache
        uses: actions/cache@v4
        with:
          path: pipeline/cache
          key: pipeline-cache-${{ github.run_id }}
          restore-keys: |
            pipeline-cache-

      # continue-on-error: Teilausfall darf den letzten gültigen /data-Stand
      # nicht zerstören; committet wird nur, was sich geändert hat.
      - name: Run pipeline (${{ inputs.mode }})
        id: pipeline
        continue-on-error: true
        run: pnpm --filter @wm/pipeline start
        env:
          WM_MODE: ${{ inputs.mode }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit & push data
        run: |
          git config user.name "wm-tipp-bot"
          git config user.email "actions@github.com"
          git add data
          if git diff --staged --quiet; then
            echo "Keine Datenänderungen — nichts zu committen."
          else
            git commit -m "data: ${{ inputs.mode }} $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push
          fi

      - name: Report pipeline failure
        if: steps.pipeline.outcome == 'failure'
        run: |
          echo "::error::Pipeline (${{ inputs.mode }}) endete mit Fehler — letzter gültiger /data-Stand bleibt erhalten."
          exit 1
