name: Pipeline-Alarm (reusable)

# Wiederverwendbarer Fehler-Alarm (Verbesserung 7): wird von den Cron-
# Workflows bei failure() aufgerufen und meldet den Fehlschlag als
# GitHub-Issue (Label "pipeline-failure"). Existiert bereits ein offenes
# Issue zum selben Workflow, wird stattdessen kommentiert — kein Issue-Spam
# bei wiederholten Fehlläufen. Issues lösen GitHub-Benachrichtigungen aus,
# so fällt ein tagelang stiller Datenstand sofort auf.
on:
  workflow_call:

permissions:
  issues: write

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const title = `Pipeline-Fehler: ${context.workflow}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body =
              `Der Workflow **${context.workflow}** ist fehlgeschlagen.\n\n` +
              `→ [Fehlgeschlagener Lauf](${runUrl})\n\n` +
              `Zeitpunkt: ${new Date().toISOString()}\n\n` +
              `_Automatisch gemeldet. Issue schließen, sobald die Ursache behoben ist._`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "pipeline-failure",
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["pipeline-failure"],
              });
            }
