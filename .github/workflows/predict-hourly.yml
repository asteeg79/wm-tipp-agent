name: KI-Tipps stündlich (T-3h)

# Stündlich (Jun/Jul): predict-Modus. 72h-Fenster + Re-Trigger (T-72/24/3h,
# inputHash, materielle News) bewerten NUR fällige Partien neu → ~3h vor
# Anpfiff. Unveränderte werden übersprungen (kein KI-Call).
# WICHTIG: krumme Minuten statt voller Stunde — GitHub verwirft/verzögert
# Scheduled Runs bei Last, am stärksten im :00-Slot (am 11.06. liefen die
# "stündlichen" Läufe real nur alle 4-5 h → T-3h-Tipps verpasst). Zwei Slots
# pro Stunde als Redundanz; die Retrigger-Logik verhindert doppelte KI-Kosten.
on:
  schedule:
    - cron: "7,22,37,52 * * 6,7 *" # 4 Slots/h — Repo ist public, Minuten unbegrenzt
  workflow_dispatch:

concurrency:
  group: data-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    # Hängende Läufe dürfen die Pipeline-Gruppe nicht blockieren.
    timeout-minutes: 25
    env:
      WM_MODE: predict
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore pipeline cache
        uses: actions/cache@v5
        with:
          path: pipeline/cache
          key: pipeline-cache-${{ github.run_id }}
          restore-keys: pipeline-cache-
      - name: Run pipeline (predict)
        id: pipeline
        continue-on-error: true
        run: pnpm --filter @wm/pipeline start
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      - name: Commit & push data
        run: |
          git config user.name "wm-tipp-bot"
          git config user.email "actions@github.com"
          git add data
          if git diff --staged --quiet; then
            echo "Keine Datenänderungen — nichts zu committen."
          else
            git commit -m "data: predict $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            # -X theirs: Konflikte in generierten /data-Dateien automatisch
            # zugunsten UNSERES (neueren) Stands lösen — verhindert den
            # Rebase-Abbruch, wenn zwei Pipeline-Läufe knapp nacheinander
            # pushen (Fehlerbild 12.06.: "could not apply ... data: predict").
            git pull --rebase --autostash -X theirs origin "${{ github.ref_name }}" || git rebase --abort || true
            git push
          fi
      - name: Report pipeline failure
        if: steps.pipeline.outcome == 'failure'
        run: |
          echo "::error::predict-Pipeline endete mit Fehler — letzter gültiger /data-Stand bleibt erhalten."
          exit 1

  # Bei Fehlschlag: GitHub-Issue-Alarm (Label "pipeline-failure", s. _alert.yml).
  alert:
    needs: run
    if: failure()
    permissions:
      issues: write
    uses: ./.github/workflows/_alert.yml
