name: Deploy to GitHub Pages

# HINWEIS: GitHub Pages erfordert bei PRIVATEN Repos einen Bezahl-Plan
# (Pro/Team). Dieses Repo ist privat → der Deploy ist daher NICHT per Push
# automatisiert, sondern nur manuell auslösbar. Sobald das Repo öffentlich
# gemacht oder das Konto auf Pro upgegradet wird, kann der push-Trigger unten
# wieder einkommentiert werden (und in configure-pages enablement: true setzen).
on:
  # push:
  #   branches: [main]
  #   paths:
  #     - "app/**"
  #     - "data/**"
  #     - "shared/**"
  #     - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Nötige Rechte für GitHub Pages Deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deploy gleichzeitig; laufende abbrechen.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # /data wird als statische Assets ins App-Build kopiert,
      # damit der Browser /data/*.json vom selben Origin laden kann.
      - name: Stage data into app public
        run: |
          mkdir -p app/public/data
          if [ -d data ]; then cp -r data/* app/public/data/ 2>/dev/null || true; fi

      - name: Generate version
        run: node scripts/gen-version.mjs

      - name: Build app
        run: pnpm --filter @wm/app build
        env:
          NODE_ENV: production
          VITE_REPO_NAME: ${{ github.event.repository.name }}

      # Bei öffentlichem Repo / Pro-Konto: enablement: true ergänzen, dann
      # aktiviert sich Pages automatisch.
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
