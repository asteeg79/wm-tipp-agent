name: News Refresh

# News für alle Teams + globale Feeds, alle 3 Stunden. KEINE KI → günstig.
# Krumme Minute: voller-Stunden-Slots werden von GitHub am ehesten verworfen.
on:
  schedule:
    - cron: "11 */3 * * *"
  workflow_dispatch:

concurrency:
  group: data-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      WM_MODE: news
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore pipeline cache
        uses: actions/cache@v5
        with:
          path: pipeline/cache
          key: pipeline-cache-${{ github.run_id }}
          restore-keys: pipeline-cache-
      - name: Run pipeline (news)
        id: pipeline
        continue-on-error: true
        run: pnpm --filter @wm/pipeline start
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      - name: Commit & push data
        run: |
          git config user.name "wm-tipp-bot"
          git config user.email "actions@github.com"
          git add data
          if git diff --staged --quiet; then
            echo "Keine Datenänderungen — nichts zu committen."
          else
            git commit -m "data: news $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            # -X theirs: Konflikte in generierten /data-Dateien automatisch
            # zugunsten UNSERES (neueren) Stands lösen — verhindert den
            # Rebase-Abbruch, wenn zwei Pipeline-Läufe knapp nacheinander
            # pushen (Fehlerbild 12.06.: "could not apply ... data: predict").
            git pull --rebase --autostash -X theirs origin "${{ github.ref_name }}" || git rebase --abort || true
            git push
          fi
      - name: Report pipeline failure
        if: steps.pipeline.outcome == 'failure'
        run: |
          echo "::error::news-Pipeline endete mit Fehler — letzter gültiger /data-Stand bleibt erhalten."
          exit 1

  # Bei Fehlschlag: GitHub-Issue-Alarm (Label "pipeline-failure", s. _alert.yml).
  alert:
    needs: run
    if: failure()
    permissions:
      issues: write
    uses: ./.github/workflows/_alert.yml
