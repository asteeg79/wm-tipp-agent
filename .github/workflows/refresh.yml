name: Data Refresh (manuell)

# Manueller Voll-Lauf: News + KI für ALLE Partien (mode wählbar, Default full).
# Für den Normalbetrieb laufen automatisch: news.yml (alle 3 h),
# predict-daily.yml (1×/Tag, 72h-Fenster), predict-hourly.yml (stündlich im
# Turnierfenster, nur fällige T-3h-Partien).
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "news | predict | full"
        required: true
        default: "full"
        type: choice
        options: [news, predict, full]

jobs:
  refresh:
    uses: ./.github/workflows/pipeline-run.yml
    with:
      mode: ${{ inputs.mode }}
    secrets: inherit
