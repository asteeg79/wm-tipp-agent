name: Data Refresh (Pipeline)

# Phase 1: manuell auslösbar; führt die Pipeline aus und committet /data.
# Der Turnier-Cron-Zeitplan (Abschnitt 10.2) folgt in Phase 6.
on:
  workflow_dispatch:

# Läufe dürfen sich nicht überlappen (idempotente Pipeline).
concurrency:
  group: data-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Inkrementeller Roh-Cache der Pipeline über Läufe hinweg erhalten
      # (Historie unveränderlich → schont Bandbreite).
      - name: Restore pipeline cache
        uses: actions/cache@v4
        with:
          path: pipeline/cache
          key: pipeline-cache-${{ github.run_id }}
          restore-keys: |
            pipeline-cache-

      # openfootball benötigt KEINEN Key. ANTHROPIC/OPENAI erst ab Phase 5
      # (KI-Ensemble); ODDS/BALLDONTLIE optional.
      - name: Run pipeline
        run: pnpm --filter @wm/pipeline start
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      # Geänderte /data committen & pushen → triggert deploy.yml.
      - name: Commit & push data
        run: |
          git config user.name "wm-tipp-bot"
          git config user.email "actions@github.com"
          git add data
          if git diff --staged --quiet; then
            echo "Keine Datenänderungen — nichts zu committen."
          else
            git commit -m "data: refresh $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
