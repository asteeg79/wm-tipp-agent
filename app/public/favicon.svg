<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Matchday-Logo: Broadcast-Look, Navy-Kachel mit Lime-Akzent + Fußball -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111a27"/>
      <stop offset="1" stop-color="#0a0e15"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <!-- Lime-Akzentbalken links (entspricht dem Header-Logo) -->
  <rect x="60" y="150" width="26" height="212" rx="13" fill="#c8ff3a"/>
  <!-- Fußball: Außenring, gefülltes Zentral-Pentagon, 5 Speichen -->
  <g transform="translate(40,0)"
     fill="none" stroke="#c8ff3a" stroke-width="18"
     stroke-linecap="round" stroke-linejoin="round">
    <circle cx="256" cy="256" r="150"/>
    <polygon points="256,206 304,241 286,297 226,297 208,241"
             fill="#c8ff3a" stroke="none"/>
    <path d="M256,206 V120"/>
    <path d="M304,241 L378,205"/>
    <path d="M286,297 L330,366"/>
    <path d="M226,297 L182,366"/>
    <path d="M208,241 L134,205"/>
  </g>
</svg>
