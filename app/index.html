    <title>WM-Tipp-Assistent 2026</title>
    <!-- Theme VOR dem ersten Paint setzen → kein Flash beim Laden. -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem("wm-tipp-theme-v1") || "system";
          var dark =
            p === "dark" ||
            (p === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.add(dark ? "dark" : "light");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
